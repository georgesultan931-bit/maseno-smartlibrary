<!DOCTYPE html>
<html><head><title>Issue Book</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body style="background:url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') no-repeat center center fixed;background-size:cover;">
<nav class="navbar navbar-dark px-4" style="background: {{ system_settings.theme_color }};"><span class="navbar-brand fw-bold">{{ system_settings.school_name }} - {{ system_settings.library_name }}</span><a href="{% url 'logout' %}" class="btn btn-light btn-sm">Logout</a></nav>
<div class="container mt-5"><div class="card p-4 shadow"><h3>Issue Book</h3><p><strong>Book:</strong> {{ book.title }}</p><p><strong>Available Copies:</strong> {{ book.available_copies }}</p><form method="POST">{% csrf_token %}<label class="form-label">Select Borrower</label><select name="user" class="form-control mb-3" required>{% for user in users %}<option value="{{ user.id }}">{{ user.username }}</option>{% endfor %}</select><button class="btn btn-primary">Issue Book</button> <a href="{% url 'book_list' %}" class="btn btn-secondary">Back</a></form></div></div></body></html>
