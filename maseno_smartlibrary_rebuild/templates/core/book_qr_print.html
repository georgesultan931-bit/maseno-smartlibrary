<!DOCTYPE html>
<html>
<head>
    <title>Book QR Code</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background: #f4f6f9; }

        .qr-card {
            width: 420px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .qr-img {
            width: 250px;
            height: 250px;
        }

        @media print {
            .no-print { display: none; }
            body { background: white; }
            .qr-card { box-shadow: none; margin-top: 20px; }
        }
    </style>
</head>

<body>

<div class="qr-card">
    <h4 class="fw-bold">{{ system_settings.school_name }}</h4>
    <p class="text-muted">{{ system_settings.library_name }}</p>

    <hr>

    <h5>{{ book.title }}</h5>
    <p class="text-muted">Author: {{ book.author }}</p>

    <img src="{% url 'book_qr_code' book.id %}" class="qr-img">

    <p class="mt-3 small text-muted">
        Scan this QR code to open the book issuing page.
    </p>

    <div class="no-print mt-3">
        <button onclick="window.print()" class="btn btn-primary">Print QR</button>
        <a href="{% url 'book_list' %}" class="btn btn-secondary">Back</a>
    </div>
</div>

</body>
</html>
