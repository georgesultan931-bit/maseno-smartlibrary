<!DOCTYPE html>
<html><head><title>Change Password</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body style="background:url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') no-repeat center center fixed;background-size:cover;">
<div class="container d-flex justify-content-center align-items-center vh-100"><div class="card p-4 shadow" style="width:420px;"><h3 class="fw-bold text-center">Create New Password</h3><p class="text-muted text-center">Your password was reset. Please create your own private password.</p>{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}<form method="POST">{% csrf_token %}<label>New Password</label><input type="password" name="new_password" class="form-control mb-3" required><label>Confirm Password</label><input type="password" name="confirm_password" class="form-control mb-3" required><button class="btn btn-primary w-100">Save New Password</button></form></div></div></body></html>
