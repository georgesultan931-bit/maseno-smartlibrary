<!DOCTYPE html>
<html><head><title>Edit User</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body style="background:url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') no-repeat center center fixed;background-size:cover;">
<nav class="navbar navbar-dark px-4" style="background: {{ system_settings.theme_color }};"><span class="navbar-brand fw-bold">{{ system_settings.school_name }} - {{ system_settings.library_name }}</span><a href="{% url 'logout' %}" class="btn btn-light btn-sm">Logout</a></nav>
<div class="container mt-5"><div class="card p-4 shadow"><h3>Edit User</h3>{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}<form method="POST">{% csrf_token %}<label>Username</label><input name="username" value="{{ profile.user.username }}" class="form-control mb-3" required><label>New Password</label><input type="password" name="password" placeholder="Leave blank to keep current password" class="form-control mb-3"><label>Role</label><select name="role" class="form-control mb-3" required><option value="admin" {% if profile.role == "admin" %}selected{% endif %}>Admin</option><option value="librarian" {% if profile.role == "librarian" %}selected{% endif %}>Librarian</option><option value="teacher" {% if profile.role == "teacher" %}selected{% endif %}>Teacher/Staff</option><option value="student" {% if profile.role == "student" %}selected{% endif %}>Student</option></select><label>Admission Number</label><input name="admission_number" value="{{ profile.admission_number|default:'' }}" class="form-control mb-3"><label>Staff Number</label><input name="staff_number" value="{{ profile.staff_number|default:'' }}" class="form-control mb-3"><label>Phone</label><input name="phone" value="{{ profile.phone|default:'' }}" class="form-control mb-3"><div class="form-check mb-3"><input type="checkbox" name="is_active" class="form-check-input" {% if profile.user.is_active %}checked{% endif %}><label class="form-check-label">Active Account</label></div><button class="btn btn-primary">Update User</button> <a href="{% url 'user_list' %}" class="btn btn-secondary">Back</a></form></div></div></body></html>
