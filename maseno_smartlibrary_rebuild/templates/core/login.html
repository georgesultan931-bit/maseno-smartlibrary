<!DOCTYPE html>
<html>
<head>
    <title>{{ system_settings.school_name }} - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') no-repeat center center fixed;
            background-size: cover;
        }
        .login-card {
            background: rgba(255,255,255,0.95);
            border-radius: 18px;
        }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card login-card p-4 shadow" style="width: 400px;">
        <h3 class="text-center fw-bold">{{ system_settings.school_name }}</h3>
        <p class="text-center text-muted">{{ system_settings.library_name }}</p>
        <form method="POST">
            {% csrf_token %}
            <label class="form-label">Admission No / Username</label>
            <input type="text" name="login_id" class="form-control mb-3" placeholder="Student admission no or staff/admin username" required>
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control mb-3" placeholder="Enter password" required>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
        {% if error %}
        <p class="text-danger mt-3 text-center">{{ error }}</p>
        {% endif %}
        <p class="text-muted small text-center mt-3">
            Forgot password? Visit the librarian or system administrator for password reset.
        </p>
    </div>
</div>
</body>
</html>
