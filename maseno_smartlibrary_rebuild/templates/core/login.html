<!DOCTYPE html>
<html>
<head>
    <title>{{ system_settings.school_name }} - Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') no-repeat center center fixed;
            background-size: cover;
        }

        .login-card {
            background: rgba(255,255,255,0.95);
            border-radius: 22px;
            width: 100%;
            max-width: 430px;
            backdrop-filter: blur(6px);
        }

        .logo-img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 50%;
            background: white;
            padding: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }

        .login-btn {
            border-radius: 12px;
            font-weight: 600;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
        }

        @media (max-width: 768px) {
            .login-card {
                margin: 15px;
                padding: 25px !important;
            }

            .logo-img {
                width: 75px;
                height: 75px;
            }

            h3 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card login-card p-4 shadow">

        <div class="text-center mb-3">

            {% if system_settings.logo %}
                <img src="{{ system_settings.logo.url }}" class="logo-img mb-3" alt="School Logo">
            {% endif %}

            <h3 class="fw-bold mb-1">
                {{ system_settings.school_name }}
            </h3>

            <p class="text-muted">
                {{ system_settings.library_name }}
            </p>

        </div>

        <form method="POST">

            {% csrf_token %}

            <label class="form-label fw-semibold">
                Admission No / Username
            </label>

            <input
                type="text"
                name="login_id"
                class="form-control mb-3"
                placeholder="Student admission no or staff/admin username"
                required
            >

            <label class="form-label fw-semibold">
                Password
            </label>

            <input
                type="password"
                name="password"
                class="form-control mb-3"
                placeholder="Enter password"
                required
            >

            <button type="submit" class="btn btn-primary w-100 login-btn">
                Login
            </button>

        </form>

        {% if error %}
            <p class="text-danger mt-3 text-center fw-semibold">
                {{ error }}
            </p>
        {% endif %}

        <p class="text-muted small text-center mt-4">
            Forgot password? Visit the librarian or system administrator for password reset.
        </p>

    </div>

</div>

</body>
</html>s
