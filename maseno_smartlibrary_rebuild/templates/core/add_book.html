<!DOCTYPE html>
<html><head><title>Add Book</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body style="background:url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') no-repeat center center fixed;background-size:cover;">
<nav class="navbar navbar-dark px-4" style="background: {{ system_settings.theme_color }};"><span class="navbar-brand fw-bold">{{ system_settings.school_name }} - {{ system_settings.library_name }}</span><a href="{% url 'logout' %}" class="btn btn-light btn-sm">Logout</a></nav>
<div class="container mt-5"><div class="card p-4 shadow"><h3>Add New Book</h3><form method="POST">{% csrf_token %}<input name="title" class="form-control mb-3" placeholder="Book Title" required><input name="author" class="form-control mb-3" placeholder="Author" required><select name="category" class="form-control mb-3"><option value="">Select Category</option>{% for cat in categories %}<option value="{{ cat.id }}">{{ cat.name }}</option>{% endfor %}</select><input type="number" name="total_copies" class="form-control mb-3" placeholder="Total Copies" min="1" required><button class="btn btn-primary">Add Book</button> <a href="{% url 'book_list' %}" class="btn btn-secondary">Back</a></form></div></div></body></html>
