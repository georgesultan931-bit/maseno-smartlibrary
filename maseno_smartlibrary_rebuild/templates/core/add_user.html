<!DOCTYPE html>
<html><head><title>Add User</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body style="background:url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f') no-repeat center center fixed;background-size:cover;">
<nav class="navbar navbar-dark px-4" style="background: {{ system_settings.theme_color }};"><span class="navbar-brand fw-bold">{{ system_settings.school_name }} - {{ system_settings.library_name }}</span><a href="{% url 'logout' %}" class="btn btn-light btn-sm">Logout</a></nav>
<div class="container mt-5"><div class="card p-4 shadow"><h3>Add User</h3>{% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}{% if success %}<div class="alert alert-success">{{ success }}</div>{% endif %}<form method="POST">{% csrf_token %}<label>Username / Staff Name</label><input name="username" class="form-control mb-3" required><label>Password</label><input type="password" name="password" class="form-control mb-3" required><label>Role</label><select name="role" class="form-control mb-3" required><option value="">Select Role</option><option value="admin">Admin</option><option value="librarian">Librarian</option><option value="teacher">Teacher/Staff</option><option value="student">Student</option></select><label>Admission Number</label><input name="admission_number" class="form-control mb-3"><label>Staff Number</label><input name="staff_number" class="form-control mb-3"><label>Phone</label><input name="phone" class="form-control mb-3"><button class="btn btn-primary">Create User</button> <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back</a></form></div></div></body></html>
